services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage
      POSTGRES_DB: triage
    ports:
      - "5432:5432"
    volumes:
      - triage_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage -d triage"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TRIAGE_MODEL: ${TRIAGE_MODEL:-claude-sonnet-4-6}
      CLASSIFY_MODEL: ${CLASSIFY_MODEL:-claude-haiku-4-5-20251001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DATABASE_URL: postgresql://triage:triage@postgres:5432/triage
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  triage_pg_data:
