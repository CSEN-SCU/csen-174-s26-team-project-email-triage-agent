name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "consolidated_project/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "consolidated_project/backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: consolidated_project/backend

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: triage
          POSTGRES_PASSWORD: triage
          POSTGRES_DB: triage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U triage"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://triage:triage@localhost:5432/triage
      ANTHROPIC_API_KEY: dummy-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: consolidated_project/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov

      - name: Lint with ruff
        run: ruff check app

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing tests/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: consolidated_project/backend
          file: consolidated_project/backend/Dockerfile
          push: false
          load: true
          tags: triage-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=dummy \
            triage-backend:ci \
            python -c "from app.main import app; print('app import OK')"
